<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="A simple HTML5 website with scrolling background image">
    <meta name="keywords" content="website, html5, background, scroll">
    <meta name="author" content="Your Name">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Simple HTML5 Website">
    <meta property="og:description" content="A simple HTML5 website with scrolling background image">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com">
    <meta property="og:image" content="https://yourwebsite.com/images/og-image.jpg">
    <meta property="og:site_name" content="Simple HTML5 Website">
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Simple HTML5 Website">
    <meta name="twitter:description" content="A simple HTML5 website with scrolling background image">
    <meta name="twitter:image" content="https://yourwebsite.com/images/twitter-image.jpg">
    
    <!-- Favicon and Apple Touch Icons -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <link rel="manifest" href="/site.webmanifest">
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#000000">
    <meta name="msapplication-TileColor" content="#000000">
    
    <title>Simple HTML5 Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-container">
        <div class="background-image" id="backgroundImage"></div>
        <div class="middleground-image" id="middlegroundImage"></div>
        <div class="foreground-image" id="foregroundImage"></div>
    </div>
    
    <main class="content">
        <div class="spacer-top"></div>
        
        <header>
            <h1>Carrion Queen</h1>
        </header>
        
        <div class="spacer-bottom"></div>
        
        <footer>
            <p>NEW MUSIC COMING SOON!!!</p>
        </footer>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
